<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>パスワードマスター ダウンロード</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; text-align: center; padding: 50px 20px; background-color: #f0f2f5; color: #333; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        h1 { color: #1a237e; font-size: 26px; margin-bottom: 5px; }
        .subtitle { color: #666; font-size: 14px; margin-bottom: 25px; }
        /* クラス適用：ボタンのデザイン（セキュリティをイメージした紺色） */
        .btn { display: inline-block; background-color: #1a237e; color: white; padding: 18px 35px; text-decoration: none; border-radius: 35px; font-weight: bold; font-size: 18px; margin: 20px 0; transition: 0.3s; box-shadow: 0 4px 10px rgba(26, 35, 126, 0.3); }
        .btn:hover { background-color: #000051; transform: translateY(-2px); }
        .guide { text-align: left; background: #e8eaf6; padding: 20px; border-radius: 12px; font-size: 14px; line-height: 1.6; border: 1px solid #c5cae9; }
        .guide h2 { font-size: 17px; margin-top: 0; color: #1a237e; display: flex; align-items: center; }
        .step { margin-bottom: 12px; display: block; border-bottom: 1px dashed #c5cae9; padding-bottom: 8px; }
        .step:last-child { border-bottom: none; }
        .highlight { font-weight: bold; color: #d32f2f; }
    </style>
</head>
<body>
    <div class="card">
        <h1>🔐 パスワードマスター</h1>
        <div class="subtitle">完全オフライン・パスワード管理アプリ</div>
        
        <p>最新のアプリ(APK)をダウンロードして、インストールを完了させてください。</p>

        <a href="https://github.com/thousand35/passwordmaster_app/releases/latest/download/app-release.apk" class="btn">最新版をダウンロード</a>

        <div class="guide">
            <h2>⚙️ インストール手順</h2>
            <span class="step">① 上のボタンを押し、ファイルを保存。</span>
            <span class="step">② スマホの<span class="highlight">「ファイル」アプリ</span>を開き、<span class="highlight">「ダウンロード」</span>の項目を確認。</span>
            <span class="step">③ <span class="highlight">「app-release.apk」</span>をタップ。</span>
            <span class="step">④ 「不明なアプリ」の警告が出た場合は「設定」→「この提供元を許可」をONにしてから、再度インストールしてください。</span>
        </div>
        <p style="font-size: 11px; color: #999; margin-top: 20px;">※個人開発アプリのため警告が出ますが、通信権限を持たない安全な設計です。</p>
    </div>
</body>
</html>
